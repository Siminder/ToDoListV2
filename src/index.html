<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="todoList.js"></script>
</head>
<body >
    <!--NavBar-->
    <nav id="navBar"style="border: 2px solid black; width: 200px; height: 900px; max-height: 900px; ">
        <!--Profile area-->
        <h3 class="profile">Profile</h3>
        <ul class="ulNav">
            
            <li> <a>view all projects</a> </li>
            <li><a> list 1</a></li>
            <li><a> list 2</a></li>
            <li><a> list 3</a></li>
        </ul>
    </nav>
    <div>
        <div class="todolist" >
            <h1>Project Name</h1>
            <button id="addList" style="background-color: transparent; border: none;">
                <svg  width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <ul class="UlforList">
        
        </ul>

        <form  onsubmit="" class="form" >
            <input type="text" id="titleInput" placeholder="Task name">
            <input type="date" id="dueDate"> 
            <select id="pirority" name="pirority">
                <option value="High">High</option>
                <option value="Med">Med</option>
                <option value="Low">Low</option>
            </select>
            <input type="text" id="description" placeholder="description">
            <button type="submit" id="submitButton" >submit</button>
            <button type="button"  id="cancelButton" >cancel</button>
        </form>

    </div>
   

         
</body>
